<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Model Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body{
margin:0;
background:#ffffff;
overflow:hidden;
}

model-viewer{
width:100%;
height:100vh;
}
</style>

</head>

<body>

<model-viewer
src="build.glb"
alt="3D Model"
ar
ar-modes="webxr scene-viewer quick-look"
environment-image="studio"
exposure="1"
shadow-intensity="1"
shadow-softness="0.6"
camera-controls
auto-rotate>

<button slot="ar-button"
style="
background:#000;
color:#fff;
border:none;
padding:12px 18px;
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
border-radius:6px;
font-size:16px;
cursor:pointer;">
View in AR
</button>

</model-viewer>

</body>
</html>
